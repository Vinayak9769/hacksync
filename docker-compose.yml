version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: hacksync-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hacksync-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SESSION_SECRET=docker-hacksync-secret-key-1234
      - MONGODB_URI=mongodb://mongodb:27017/hacksync
      # Add default/placeholder external credentials or placeholders:
      - TWILIO_ACCOUNT_SID=ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
      - TWILIO_AUTH_TOKEN=your_twilio_auth_token
      - TWILIO_PHONE_NUMBER=+1234567890
      - DEEPGRAM_API_KEY=placeholder
      - GEMINI_API_KEY=placeholder
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000/api
        - NEXT_PUBLIC_FRONTEND_URL=http://localhost:8000
    container_name: hacksync-frontend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - NEXT_PUBLIC_FRONTEND_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
